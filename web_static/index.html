<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>3D 标签人工微调</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <aside class="sidebar">
      <header class="brand">
        <span>Manual Adjust App</span>
        <h1>3D 标签人工微调</h1>
      </header>

      <section class="panel">
        <div class="panel-title-row">
          <h2>数据</h2>
          <span id="adjustNeededCount" class="adjust-needed-count">需修改 0/0</span>
          <button id="refreshSamples" class="secondary" type="button">刷新文件列表</button>
        </div>
        <label>输入根目录
          <input id="datasetRoot" type="text" spellcheck="false" />
        </label>
        <label>输出根目录
          <input id="outputRoot" type="text" spellcheck="false" />
        </label>
        <label>样本
          <select id="sampleSelect"></select>
        </label>
        <div class="sample-filter-row">
          <label>状态筛选
            <select id="sampleStatusFilter">
              <option value="all">全部样本</option>
              <option value="none">待微调</option>
              <option value="adjusted">已微调待审核</option>
              <option value="changes_required">已审核待修改</option>
              <option value="reviewed">已审核为优</option>
            </select>
          </label>
          <label>按自评筛选
            <select id="sampleRatingFilter">
              <option value="all">全部自评</option>
              <option value="good">好</option>
              <option value="medium">中</option>
              <option value="bad">差</option>
              <option value="unknown">未知</option>
              <option value="none">未自评</option>
            </select>
          </label>
        </div>
        <div class="data-actions">
          <button id="exportZipBtn" class="secondary" type="button">导出全部 ZIP</button>
          <button id="importReviewBtn" class="secondary" type="button">导入审核文件</button>
          <input id="reviewFileInput" type="file" accept="application/json,.json" hidden />
        </div>
      </section>

      <section class="panel">
        <h2>选择</h2>
        <div class="target-toggle" role="group" aria-label="选择移动对象">
          <label><input type="radio" name="targetKind" value="label" checked /> 标签</label>
          <label><input type="radio" name="targetKind" value="anchor" /> 锚点</label>
        </div>
        <label>当前对象
          <select id="targetSelect"></select>
        </label>
        <div class="label-meta">
          <strong id="targetTitle">-</strong>
          <span id="targetText">-</span>
        </div>

        <label class="step-control">主视角移动步长
          <input id="stepSize" type="number" step="0.01" value="0.15" />
        </label>
        <h3>主视角观察坐标</h3>
        <div class="grid3">
          <label>X <input id="camX" type="number" step="0.01" /></label>
          <label>Y <input id="camY" type="number" step="0.01" /></label>
          <label>Z <input id="camZ" type="number" step="0.01" /></label>
        </div>

        <h3>世界坐标</h3>
        <div class="grid3">
          <label>X <input id="worldX" type="number" readonly /></label>
          <label>Y <input id="worldY" type="number" readonly /></label>
          <label>Z <input id="worldZ" type="number" readonly /></label>
        </div>

        <h3>3D 标签框尺寸</h3>
        <div class="grid3">
          <label>宽 <input id="boxX" type="number" readonly /></label>
          <label>高 <input id="boxY" type="number" readonly /></label>
          <label>厚 <input id="boxZ" type="number" readonly /></label>
        </div>
      </section>

      <section class="panel">
        <h2>只读相机</h2>
        <div class="grid2">
          <label>半径 <input id="cameraRadius" type="number" readonly /></label>
          <label>扰动角 <input id="perturbDegrees" type="number" readonly /></label>
          <label>焦距 mm <input id="focalLength" type="number" readonly /></label>
          <label>传感器宽 mm <input id="sensorWidth" type="number" readonly /></label>
          <label>传感器高 mm <input id="sensorHeight" type="number" readonly /></label>
          <label>近裁剪 <input id="nearClip" type="number" readonly /></label>
          <label>远裁剪 <input id="farClip" type="number" readonly /></label>
          <label>图片宽 <input id="imageWidth" type="number" readonly /></label>
          <label>图片高 <input id="imageHeight" type="number" readonly /></label>
        </div>
      </section>

      <section class="panel log-panel">
        <div class="panel-title-row">
          <h2>日志</h2>
          <button id="refreshLogBtn" class="secondary" type="button">刷新</button>
        </div>
        <pre id="backendLogBox" class="backend-log-box">等待日志</pre>
      </section>
    </aside>

    <main class="workspace">
      <header class="topbar">
        <div class="topbar-info">
          <span>Adaptive OBJ-O Projection Views</span>
          <div class="sample-heading-row">
            <h2 id="sampleTitle">未加载</h2>
            <div class="source-paths">
              <label>JSON 来源
                <input id="annotationPath" type="text" spellcheck="false" readonly />
              </label>
              <label>OBJ-P 来源
                <input id="objPath" type="text" spellcheck="false" readonly />
              </label>
            </div>
          </div>
          <div class="top-actions">
            <button id="loadBtn" class="secondary">从 input 加载</button>
            <button id="loadAdjustedBtn" class="secondary" type="button" disabled>从 output 加载</button>
            <button id="undoBtn" class="secondary icon-button" type="button" disabled title="上一步" aria-label="上一步">
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <path d="M9 7H4V2" />
                <path d="M4.7 7.3A8 8 0 1 1 4 12" />
              </svg>
            </button>
            <button id="redoBtn" class="secondary icon-button" type="button" disabled title="下一步" aria-label="下一步">
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <path d="M15 7h5V2" />
                <path d="M19.3 7.3A8 8 0 1 0 20 12" />
              </svg>
            </button>
            <button id="renderBtn" class="primary">生成投影</button>
            <button id="saveBtn" class="secondary">保存完整结果</button>
          </div>
          <p id="statusText" class="status">等待加载</p>
          <div class="axis-sliders">
            <div class="axis-slider">
              <button class="axis-step" type="button" data-axis="0" data-delta="-1">-x</button>
              <input id="sliderX" type="range" min="-20" max="20" step="1" value="0" data-axis="0" aria-label="x 轴移动" />
              <button class="axis-step" type="button" data-axis="0" data-delta="1">+x</button>
            </div>
            <div class="axis-slider">
              <button class="axis-step" type="button" data-axis="1" data-delta="-1">-y</button>
              <input id="sliderY" type="range" min="-20" max="20" step="1" value="0" data-axis="1" aria-label="y 轴移动" />
              <button class="axis-step" type="button" data-axis="1" data-delta="1">+y</button>
            </div>
            <div class="axis-slider">
              <button class="axis-step" type="button" data-axis="2" data-delta="-1">-z</button>
              <input id="sliderZ" type="range" min="-20" max="20" step="1" value="0" data-axis="2" aria-label="z 轴移动" />
              <button class="axis-step" type="button" data-axis="2" data-delta="1">+z</button>
            </div>
          </div>
        </div>
        <div class="top-controls">
          <div class="output-grid metadata-grid">
            <label class="editor-name-field">名字（必填）
              <input id="editorName" type="text" spellcheck="false" placeholder="请输入名字" />
            </label>
            <label class="self-rating-field">自评（必填）
              <select id="selfRating">
                <option value="">请选择</option>
                <option value="good">好</option>
                <option value="medium">中</option>
                <option value="bad">差</option>
              </select>
            </label>
            <label class="remark-field adjuster-remark-field">备注
              <textarea id="adjusterRemark" rows="2" spellcheck="false" placeholder="可填写本次微调说明、疑点或需要审核重点关注的地方"></textarea>
            </label>
            <div class="sample-state-box sample-state-inline">
              <span>样本状态</span>
              <strong id="reviewStatusText">待微调</strong>
            </div>
            <label class="admin-rating-field">审核评价
              <input id="adminRatingText" type="text" readonly placeholder="-" />
            </label>
            <label class="remark-field admin-remark-field">审核备注
              <textarea id="adminRemarkText" rows="2" readonly></textarea>
            </label>
          </div>
        </div>
      </header>

      <section class="views">
        <article class="view-card obj-preview-card" data-view="obj-o">
          <header class="obj-preview-header">
            <span>obj-o</span>
            <div class="obj-preview-controls">
              <span id="objOUpdateHint" class="obj-update-hint hidden">已变化请更新</span>
              <select id="objOSourceSelect" aria-label="OBJ-O 状态">
                <option value="input">输入状态</option>
                <option value="output">输出状态</option>
                <option value="temp">微调中</option>
              </select>
              <select id="objOViewSelect" aria-label="OBJ-O view">
                <option value="main">主视角</option>
                <option value="up">上视角</option>
                <option value="down">下视角</option>
                <option value="left">左视角</option>
                <option value="right">右视角</option>
              </select>
              <button id="resetObjOViewBtn" class="secondary" type="button">重置</button>
            </div>
          </header>
          <div class="obj-viewer-shell">
            <canvas id="objOCanvas" aria-label="OBJ-O 3D preview"></canvas>
            <div id="objOEmpty" class="obj-viewer-empty">保存完整结果后可在这里查看 OBJ-O</div>
          </div>
        </article>

        <article class="view-card" data-view="main">
          <header>主视角</header>
          <div class="projection-shell">
            <div id="guideMain" class="axis-legend"></div>
            <div class="image-frame">
              <img id="imgMain" class="base-projection" alt="main projection" />
              <img id="partMain" class="part-overlay-img" alt="" />
              <svg id="overlayMain" class="move-overlay"></svg>
            </div>
          </div>
        </article>

        <article class="view-card" data-view="up">
          <header>上视角</header>
          <div class="projection-shell">
            <div id="guideUp" class="axis-legend"></div>
            <div class="image-frame">
              <img id="imgUp" class="base-projection" alt="up projection" />
              <img id="partUp" class="part-overlay-img" alt="" />
              <svg id="overlayUp" class="move-overlay"></svg>
            </div>
          </div>
        </article>

        <article class="view-card" data-view="down">
          <header>下视角</header>
          <div class="projection-shell">
            <div id="guideDown" class="axis-legend"></div>
            <div class="image-frame">
              <img id="imgDown" class="base-projection" alt="down projection" />
              <img id="partDown" class="part-overlay-img" alt="" />
              <svg id="overlayDown" class="move-overlay"></svg>
            </div>
          </div>
        </article>

        <article class="view-card" data-view="left">
          <header>左视角</header>
          <div class="projection-shell">
            <div id="guideLeft" class="axis-legend"></div>
            <div class="image-frame">
              <img id="imgLeft" class="base-projection" alt="left projection" />
              <img id="partLeft" class="part-overlay-img" alt="" />
              <svg id="overlayLeft" class="move-overlay"></svg>
            </div>
          </div>
        </article>

        <article class="view-card" data-view="right">
          <header>右视角</header>
          <div class="projection-shell">
            <div id="guideRight" class="axis-legend"></div>
            <div class="image-frame">
              <img id="imgRight" class="base-projection" alt="right projection" />
              <img id="partRight" class="part-overlay-img" alt="" />
              <svg id="overlayRight" class="move-overlay"></svg>
            </div>
          </div>
        </article>
      </section>
    </main>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.164.1/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.164.1/examples/jsm/"
        }
      }
    </script>
    <script type="module" src="/static/obj_o_viewer.js"></script>
    <script src="/static/editor.js"></script>
  </body>
</html>
